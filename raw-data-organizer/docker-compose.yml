version: '3.8'

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/minio_root
    command: server /minio_root --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  raw-data-organizer:
    build: .
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      SOURCE_BUCKET: rtb-raw-data
      SOURCE_PREFIX: incoming/
      DEST_BUCKET: rtb-organized
      DEST_PREFIX: organized/
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app/src
    working_dir: /app

volumes:
  minio-data:
