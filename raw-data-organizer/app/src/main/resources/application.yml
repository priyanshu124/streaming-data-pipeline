spring:
  application:
    name: raw-data-organizer

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:minio123}

rtb:
  organizer:
    source:
      bucket: ${SOURCE_BUCKET:ad-bidding-analytics-raw-data}
      prefix: ${SOURCE_PREFIX:ipinyou.contest.dataset/}
    destination:
      bucket: ${DEST_BUCKET:rtb-analytics}
      prefix: ${DEST_PREFIX:raw-organized/}
